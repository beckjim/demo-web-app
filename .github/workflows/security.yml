name: Security Scans

on:
    push:
        branches:
            - master
            - main
    pull_request:
        branches:
            - master
            - main

jobs:
    security:
        runs-on: ubuntu-latest
        name: Dependency and SAST checks

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.14"

            - name: Install uv
              run: pip install uv

            - name: Install dependencies
              run: uv sync --extra dev

            - name: Dependency vulnerability scan (uv-secure)
              run: uvx uv-secure uv.lock

            - name: Filesystem vulnerability scan (Trivy)
              uses: aquasecurity/trivy-action@0.28.0
              with:
                  scan-type: fs
                  scan-ref: .
                  vuln-type: os,library
                  severity: HIGH,CRITICAL
                  ignore-unfixed: true
                  exit-code: "1"

            - name: Static security scan (bandit)
              run: uv run bandit -r src/employee_dialogue
